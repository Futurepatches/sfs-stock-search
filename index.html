<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STANDARD FLUID SYSTEMS | Inventory Portal</title>
    <style>
        :root {
            --brand-blue: #1E4D9C;
            --brand-red: #E73B32;
            --bg-gray: #f4f7f9;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; }
        .main-card { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); border-top: 6px solid var(--brand-blue); }
        .header { text-align: center; margin-bottom: 30px; }
        .logo-placeholder { max-width: 280px; margin-bottom: 10px; }
        .title { color: var(--brand-red); font-weight: bold; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Search Box */
        .search-section { margin-bottom: 25px; text-align: center; }
        input#searchInput { 
            width: 100%; padding: 15px; font-size: 18px; border: 2px solid #ddd; 
            border-radius: 8px; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        input#searchInput:focus { border-color: var(--brand-blue); background: #fff; }
        
        /* Table Styling */
        .results-container { display: none; margin-top: 20px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--brand-blue); color: white; padding: 15px; text-align: left; font-size: 14px; }
        td { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; font-size: 15px; color: #333; }
        tr:hover { background: #f9fbff; }
        
        /* Stock Logic */
        .qty { font-weight: bold; color: #27ae60; text-align: center; }
        .out { color: var(--brand-red) !important; }

        .status { text-align: center; padding: 10px; font-size: 13px; color: #666; }
        .error-alert { display: none; background: #fff1f0; border: 1px solid #ffa39e; padding: 15px; border-radius: 6px; color: var(--brand-red); margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <img src="logo.png" alt="STANDARD FLUID SYSTEMS" class="logo-placeholder" onerror="this.style.display='none'">
        <div class="title">Inventory Stock Search</div>
    </div>

    <div id="apiError" class="error-alert">
        <strong>Database Offline:</strong> Connection could not be established.
    </div>

    <div class="search-section">
        <input type="text" id="searchInput" onkeyup="searchInventory()" placeholder="Search Part Number or Model..." disabled>
        <div id="loadStatus" class="status">Connecting to Google Sheets...</div>
    </div>

    <div id="resultsTable" class="results-container">
        <table>
            <thead>
                <tr>
                    <th width="35%">Part Number</th>
                    <th width="45%">Description</th>
                    <th width="20%" style="text-align:center">Available Stock</th>
                </tr>
            </thead>
            <tbody id="tableData"></tbody>
        </table>
    </div>
</div>

<script>
    // Your verified Google Web App URL
    const API_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwv_wv283PnwYh3CnhdLcLfznw7QneStze1RWUONVwD2Yd_c6y3Ux1cFbQhNswb7fEI/exec';
    
    let stockData = [];

    // Fetching logic
    async function initSystem() {
        const status = document.getElementById('loadStatus');
        const searchInput = document.getElementById('searchInput');
        const errorBox = document.getElementById('apiError');

        try {
            const response = await fetch(API_ENDPOINT);
            if (!response.ok) throw new Error();
            
            const data = await response.json();
            
            // Assuming Column A (0) is Part, Column C (2) is Desc, Column G (6) is Stock
            stockData = data.slice(1)
                .filter(row => row[0] && row[0].toString().trim() !== "")
                .map(row => ({
                    part: row[0],
                    desc: row[2] || '---',
                    qty: row[6] || 0
                }));

            status.innerHTML = "✅ System Online | Data Ready";
            status.style.color = "#27ae60";
            searchInput.disabled = false;
            searchInput.focus();

        } catch (e) {
            console.error(e);
            status.innerHTML = "❌ System Offline";
            errorBox.style.display = 'block';
        }
    }

    // Search logic
    function searchInventory() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const results = document.getElementById('resultsTable');
        const tbody = document.getElementById('tableData');

        if (query.trim() === "") {
            results.style.display = 'none';
            return;
        }

        const filtered = stockData.filter(item => 
            item.part.toString().toLowerCase().includes(query) || 
            item.desc.toString().toLowerCase().includes(query)
        );

        if (filtered.length > 0) {
            results.style.display = 'block';
            tbody.innerHTML = filtered.map(item => {
                const stockVal = parseFloat(item.qty) || 0;
                const isOut = stockVal <= 0;
                return `
                    <tr>
                        <td><strong>${item.part}</strong></td>
                        <td>${item.desc}</td>
                        <td class="qty ${isOut ? 'out' : ''}">${item.qty}</td>
                    </tr>`;
            }).join('');
        } else {
            results.style.display = 'none';
        }
    }

    // Start
    window.onload = initSystem;
</script>

</body>
</html>
