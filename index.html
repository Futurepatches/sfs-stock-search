<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFS | Inventory Stock Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1E4D9C; /* Corporate Blue */
            --accent: #E73B32;  /* Corporate Red */
            --bg: #F8FAFC;
            --text: #1E293B;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-top: 8px solid var(--primary);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            margin: 10px 0 5px 0;
            font-size: 24px;
            text-transform: uppercase;
        }

        .header p {
            color: #64748B;
            margin: 0;
            font-size: 14px;
        }

        /* Status Indicators */
        .status-bar {
            text-align: center;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .online { color: #10B981; }
        .offline { color: var(--accent); }

        /* Search Input */
        .search-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        #searchInput {
            width: 100%;
            padding: 16px 20px;
            font-size: 18px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
        }

        #searchInput:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(30, 77, 156, 0.1);
        }

        /* Table Design */
        .table-container {
            overflow-x: auto;
            display: none;
            border-radius: 8px;
            border: 1px solid #E2E8F0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #F1F5F9;
            padding: 15px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #475569;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #F1F5F9;
            font-size: 15px;
        }

        tr:last-child td { border-bottom: none; }

        .part-no { font-weight: 700; color: var(--primary); }
        .stock-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            background: #DCFCE7;
            color: #166534;
            display: inline-block;
        }

        .out-of-stock {
            background: #FEE2E2;
            color: #991B1B;
        }

        /* Loader */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            td, th { padding: 10px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Standard Fluid Systems</h1>
        <p>Live Inventory Management Portal</p>
    </div>

    <div class="status-bar" id="statusBar">
        <div class="loader" id="loader"></div>
        <span id="statusText">Connecting to Database...</span>
    </div>

    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Enter Part Number (e.g. AS2201F)..." disabled>
    </div>

    <div class="table-container" id="tableContainer">
        <table>
            <thead>
                <tr>
                    <th>Part Number</th>
                    <th>Description</th>
                    <th style="text-align:center">Stock</th>
                </tr>
            </thead>
            <tbody id="inventoryBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Your Verified Google Script URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwv_wv283PnwYh3CnhdLcLfznw7QneStze1RWUONVwD2Yd_c6y3Ux1cFbQhNswb7fEI/exec';

    let inventoryData = [];

    async function loadData() {
        const statusText = document.getElementById('statusText');
        const loader = document.getElementById('loader');
        const searchInput = document.getElementById('searchInput');

        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();

            // Format Data: A=0 (Part), C=2 (Desc), G=6 (Stock)
            inventoryData = data.slice(1).map(row => ({
                part: row[0] ? row[0].toString().trim() : "",
                desc: row[2] ? row[2].toString().trim() : "---",
                stock: row[6] !== "" ? row[6] : 0
            })).filter(item => item.part !== "");

            // Success
            loader.style.display = 'none';
            statusText.innerHTML = "✅ Database Connected | System Ready";
            statusText.className = "online";
            searchInput.disabled = false;
            searchInput.focus();

        } catch (error) {
            console.error(error);
            loader.style.display = 'none';
            statusText.innerHTML = "❌ Connection Failed. Please Refresh.";
            statusText.className = "offline";
        }
    }

    function search() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const container = document.getElementById('tableContainer');
        const body = document.getElementById('inventoryBody');

        if (term.length < 1) {
            container.style.display = 'none';
            return;
        }

        const filtered = inventoryData.filter(item => 
            item.part.toLowerCase().includes(term) || 
            item.desc.toLowerCase().includes(term)
        );

        if (filtered.length > 0) {
            container.style.display = 'block';
            body.innerHTML = filtered.map(item => `
                <tr>
                    <td class="part-no">${item.part}</td>
                    <td>${item.desc}</td>
                    <td style="text-align:center">
                        <span class="stock-badge ${item.stock <= 0 ? 'out-of-stock' : ''}">
                            ${item.stock}
                        </span>
                    </td>
                </tr>
            `).join('');
        } else {
            body.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px;">No matching items found.</td></tr>';
            container.style.display = 'block';
        }
    }

    document.getElementById('searchInput').addEventListener('input', search);
    window.onload = loadData;
</script>

</body>
</html>
