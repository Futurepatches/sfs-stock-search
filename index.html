<script>
    // NEW Google Sheet CSV URL
    const SCRIPT_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSS4E1DvaV4RzuMHMENiroSR4WYZjT0usnqAgUwX-W44ADM-sB1Gz8lYNvK51-WP88BYi4lYLxwZaU3/pub?output=csv';

    let inventoryData = [];

    // System Initialization
    async function initSystem() {
        const statusText = document.getElementById('statusText');
        const statusBar = document.getElementById('statusBar');
        const loader = document.getElementById('loader');
        const searchInput = document.getElementById('searchInput');

        try {
            // Fetching data from Google Sheets
            const response = await fetch(SCRIPT_URL);
            if (!response.ok) throw new Error('HTTP Error');

            const data = await response.text();
            const rows = data.split("\n").map(row => row.split(","));
            
            // Mapping: Col A (0) = Part, Col C (2) = Desc, Col G (6) = Stock
            inventoryData = rows.slice(1).map(row => ({
                part: row[0] ? row[0].toString().trim() : "",
                desc: row[2] ? row[2].toString().trim() : "---",
                stock: (row[6] !== "" && row[6] !== undefined) ? row[6] : 0
            })).filter(item => item.part !== "");

            // UI Success State
            loader.style.display = 'none';
            statusText.innerHTML = "✅ System Online | Inventory Ready";
            statusBar.classList.add('online');
            searchInput.disabled = false;
            searchInput.placeholder = "Enter part number to search...";
            searchInput.focus();

        } catch (error) {
            console.error('System Error:', error);
            loader.style.display = 'none';
            statusText.innerHTML = "❌ Connection Failed. Use Ctrl+F5 to Refresh.";
            statusBar.classList.add('offline');
        }
    }

    // Search Logic
    function searchStock() {
        const term = document.getElementById('searchInput').value.toLowerCase().trim();
        const container = document.getElementById('tableContainer');
        const body = document.getElementById('inventoryBody');

        if (term === "") {
            container.style.display = 'none';
            return;
        }

        const matches = inventoryData.filter(item => 
            item.part.toLowerCase().includes(term) || 
            item.desc.toLowerCase().includes(term)
        );

        if (matches.length > 0) {
            container.style.display = 'block';
            body.innerHTML = matches.map(item => {
                const stockVal = parseFloat(item.stock) || 0;
                const isOut = stockVal <= 0;
                return `
                <tr>
                    <td class="part-no">${item.part}</td>
                    <td>${item.desc}</td>
                    <td style="text-align:center">
                        <span class="stock-badge ${isOut ? 'out-of-stock' : ''}">
                            ${item.stock}
                        </span>
                    </td>
                </tr>`;
            }).join('');
        } else {
            container.style.display = 'block';
            body.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:30px; color:#64748B;">No matching stock items found.</td></tr>';
        }
    }

    // Event Listeners
    document.getElementById('searchInput').addEventListener('input', searchStock);
    window.onload = initSystem;
</script>
