<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS | Smart Inventory Search</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Inter; background:#F8FAFC; padding:20px; }
.container { max-width:900px; margin:auto; background:white; padding:25px; border-radius:12px; }
h1 { text-align:center; color:#1E4D9C; }

.search-box { position:relative; }
#searchInput {
  width:100%; padding:15px; font-size:16px;
  border-radius:10px; border:2px solid #ddd;
}
#suggestions {
  position:absolute; width:100%; background:white;
  border:1px solid #ddd; border-top:none;
  max-height:200px; overflow:auto; display:none;
}
.suggestion {
  padding:10px; cursor:pointer;
}
.suggestion:hover { background:#f1f5f9; }

.filter {
  margin:15px 0;
}
select {
  padding:10px; border-radius:8px;
}

table { width:100%; border-collapse:collapse; margin-top:15px; }
th, td { padding:12px; border-bottom:1px solid #eee; }
th { background:#f1f5f9; }
.part-no { color:#1E4D9C; font-weight:bold; }
.stock { padding:5px 10px; border-radius:6px; background:#DCFCE7; }
.out { background:#FEE2E2; }
</style>
</head>
<body>

<div class="container">
<h1>Inventory Search</h1>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search part, description..." disabled>
<div id="suggestions"></div>
</div>

<div class="filter">
<select id="locationFilter">
<option value="">All Locations</option>
</select>
</div>

<table id="table" style="display:none;">
<thead>
<tr>
<th>Part</th>
<th>Location</th>
<th>Description</th>
<th>Stock</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSS4E1DvaV4RzuMHMENiroSR4WYZjT0usnqAgUwX-W44ADM-sB1Gz8lYNvK51-WP88BYi4lYLxwZaU3/pub?gid=1719776219&single=true&output=csv&_=" + new Date().getTime();

let data = [];

async function loadData(){
 let res = await fetch(URL);
 let txt = await res.text();
 let rows = Papa.parse(txt).data;

 data = rows.slice(1).map(r=>({
  part:r[0]||"",
  location:r[1]||"",
  desc:r[2]||"",
  stock:r[6]||0
 })).filter(i=>i.part);

 document.getElementById("searchInput").disabled=false;

 loadLocations();
}

function loadLocations(){
 let set = new Set(data.map(i=>i.location));
 let select = document.getElementById("locationFilter");
 set.forEach(loc=>{
  let opt = document.createElement("option");
  opt.value=loc;
  opt.textContent=loc;
  select.appendChild(opt);
 });
}

function render(list){
 let body = document.getElementById("body");
 let table = document.getElementById("table");

 table.style.display="table";

 body.innerHTML = list.map(i=>{
  let out = parseFloat(i.stock)<=0;
  return `<tr>
   <td class="part-no">${i.part}</td>
   <td>${i.location}</td>
   <td>${i.desc}</td>
   <td><span class="stock ${out?'out':''}">${i.stock}</span></td>
  </tr>`;
 }).join("");
}

function search(){
 let val = searchInput.value.toLowerCase();
 let loc = locationFilter.value;

 let filtered = data.filter(i=>{
  return (
   (i.part.toLowerCase().includes(val) ||
    i.desc.toLowerCase().includes(val) ||
    i.location.toLowerCase().includes(val))
   &&
   (loc=="" || i.location==loc)
  );
 });

 render(filtered);
 showSuggestions(val);
}

function showSuggestions(val){
 let box = document.getElementById("suggestions");
 if(!val){ box.style.display="none"; return; }

 let matches = data.filter(i=>i.part.toLowerCase().includes(val)).slice(0,5);

 box.innerHTML = matches.map(i=>
  `<div class="suggestion" onclick="selectItem('${i.part}')">${i.part}</div>`
 ).join("");

 box.style.display="block";
}

function selectItem(part){
 searchInput.value = part;
 document.getElementById("suggestions").style.display="none";
 search();
}

searchInput.addEventListener("input", search);
locationFilter.addEventListener("change", search);

loadData();
setInterval(loadData,60000);
</script>

</body>
</html>
